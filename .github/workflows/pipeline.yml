name: Jobs Paralelo vs Sequencial

on:  #Primeiro componente configurado
  push:
    
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:      
      - uses: actions/checkout@v4
      - name: Lint  
        run: echo "Lint Ok"

  testes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Testes
        run: echo "Testes Ok"

  build:
    needs: [lint, testes]
