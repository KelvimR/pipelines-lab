name: Hello GitHubActions

on:  #Primeiro componente configurado
  push:
    branches: [main]
  pull_request: 
   branches: [main]
  workflow_dispatch: 

jobs:
  hello-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout no Código
        uses: actions/checkout@v4

      - name: Executar Hello world
        run: echo " Hello Github Actions"

      - name: Mostrar Informações do Sistema
        run: |
         echo "Sistema Operacional: ${{ runner.os }}"
         echo "Diretóio Atual: $(pwd)"
         echo "Data Atual: $(date)"
         echo "Usuário: $(whoami)"

      - name: Listar Arquivos do Repositório
        run: ls -la

      - name: Comandos Multiplos
        run: |
         echo "Este é o Lab 01 do curso de Github Actions"
         echo "Wokflow executado com sucesso"
         echo "Pronto para os próximos desafios!"
