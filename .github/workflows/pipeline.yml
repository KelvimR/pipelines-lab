name: Deploy Multi-Ambientes

on:  
  workflow_dispatch:
    
jobs:
  mostrar-variaveis-repositorios:
    runs-on: ubuntu-latest

    steps:
      - name: Exibir variaveis de repositorio
        run: |
          echo "=== VARIAVEIS DE REPOSITORIO ==="
          echo "Aplicação: ${{ vars.APP_NAME }}"
          echo "Região: ${{ vars.DEFAULT_REGION }}"
          echo "Timeout padrão: ${{ vars.DEFAULT_TIMEOUT }}"
          echo "Versão do Node: ${{ vars.NODE_VERSION }}"

  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Configurar ambiente DEV
        run: |
          echo "=== DEPLOY EM DESENVOLVIMENTO ==="
          echo "Aplicação: ${{ vars.APP_NAME }}"
          echo "Ambiente: ${{ vars.ENVIROMENT }}"
          echo "API URL: ${{ vars.API_URL }}"
          echo "Database: ${{ vars.DATABASE_NAME }}"
          echo "Regiao: ${{ vars.DEFAULT_REGION }}"
          echo "Debug Mode: ${{ vars.DEBUG_MODE }}"
          echo "Max Connections: ${{ vars.MAX_CONNECTIONS }}"
      
      - name: Simular Build para Dev
        run: |
          echo "Compilando aplicação paa ${{ vars.ENVIROMENT }}"
          echo "URL de destino: ${{ vars.API_URL }}"
          sleep 2
          echo "Build concluido para DEV"

  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    needs: deploy-dev
    steps:
      - name: Configurar ambiente staging
        run: |
          echo "=== DEPLOY EM STAGING ==="
          echo "Aplicação: ${{ vars.APP_NAME }}"
          echo "Ambiente: ${{ vars.ENVIROMENT }}"
          echo "API URL: ${{ vars.API_URL }}"
          echo "Database: ${{ vars.DATABASE_NAME }}"
          echo "Regiao: ${{ vars.DEFAULT_REGION }}"
          echo "Debug Mode: ${{ vars.DEBUG_MODE }}"
          echo "Max Connections: ${{ vars.MAX_CONNECTIONS }}"

      - name: Simular testes de integração
        run: |
          echo "Executanto testes em ${{ vars.ENVIROMENT }}"
          echo "Endpoint: ${{ vars.API.URL }}"
          sleep 2
          echo "Testes aprovados em STAGING"

  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-staging
    steps:
      - name: Configurar Ambiente PRODUCTION
        run: |
          echo "=== DEPLOY EM PRODUCTION ==="
          echo "Aplicação: ${{ vars.APP_NAME }}"
          echo "Ambiente: ${{ vars.ENVIROMENT }}"
          echo "API URL: ${{ vars.API_URL }}"
          echo "Database: ${{ vars.DATABASE_NAME }}"
          echo "Regiao: ${{ vars.DEFAULT_REGION }}"
          echo "Debug Mode: ${{ vars.DEBUG_MODE }}"
          echo "Max Connections: ${{ vars.MAX_CONNECTIONS }}"

      - name: Deploy em produção
        run: |
          echo "Realizando deploy em ${{ vars.ENVIROMENT }}"
          echo "URL publica: ${{ vars.API_URL }}"
          sleep 3
          echo "Deploy em produção concluida com sucesso"

      - name: Notificar equipe
        run: |
          echo "Enviando notifcação de deploy para ${{ vars.API_URL }} "
          echo "Versão implantada: ${{ vars.APP_NAME }} em ${{ vars.ENVIROMENT }}"