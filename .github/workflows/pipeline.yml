    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: echo "Build executado"
  
  publicar:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Publicar (simulado)
        run: echo "Publicação concluída"