name: Demo Github Secrets

on:
  push: 
    branches: [main]
  workflow_dispatch:
    
jobs:
  demonstrar-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Fazer checkout do repositorio
        uses: actions/checkout@v4

        #Secrets em variaveis de ambientes
      - name: Configurar credencias da API
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_URL: ${{ secrets.API_URL }}
        run: |
          echo "Configurando conexao com API externa..."
          echo "URL da API: ${{secrets.API_URL }}"
          echo "API Key está configurada: ${secrets.API_KEY:+SIM}"

        #simulando conexao com banco com secrets
      - name: Conectar ao banco de dados
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: |
          echo "Configurando conexao com banco de dados"
          echo "Host: ${{ secrets.DB_HOST }}"
          echo "Porta: ${{ secrets.DB_PORT }}"
          echo "Usuário: ${{ secrets.DB_USERNAME }}"
          echo "Senha: ${{ secrets.DB_PASSWORD }}"
          echo "Observe que a senha será mascarada nos logs"
        
         #usar secret em um token
      - name: Preparar deploy com token
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          echo "Preparando deploy..."
          echo "Token de deploy: $DEPLOY_TOKEN"
          echo "Github automaticamente mascara o valor real do token "
        
        #demonstrar secret não são expoxtas em logs
      - name: Verificar segurança dos secrets
        run: |
          echo "Segurança dos secrets"
          echo "- Secrets nunca aparecem em logs (são substituidos por ***)"
          echo "- Secrets não são acessiveis em forks do repositorio"
          echo "- Secrets só são expostos para workflows autorizados"
          echo "- Você pode atualizar secrets sem alterar código"