name: Matrix Strategy

on:
  push:
    branches: [main]
  workflow_dispatch: 

jobs:
  test-matrix:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false #não para se o job falhar
      matrix:
        os: [ubuntu-latest, windows-latest,macos-latest]
        node-version: [16,18,20]
        include:
          #config especificas
          - os: ubuntu-latest
            node-version: 20
            experimental: true
        exclude:
          #excluir combbinacoes problematicas
          - os: windows-latest
            node-version: 16

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Informações da matrix
        run: |
          echo "OS: ${{ matrix.os }}"
          echo "Node: ${{ matrix.node-version }}"
          echo "Experimental: ${{ matrix.experimental }}"


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Verificar versões
        run: |
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"

      - name: Executar testes especificos do OS
        run: |
          echo "Executando testes no ${{ matrix.os }} com Node ${{ matrix.node-version }}..."
          sleep 2
          echo "Testes concluidos"

      - name: Teste experimental
        if: matrix.experimental == true  
        run: |
          echo "Executando testes experimentais..."
          sleep 1
          echo "Testes experimentais concluidos"

  collect-results:
    runs-on: ubuntu-latest
    needs: test-matrix

    steps:
      - name: Coletar resultados
        run: |
          echo "Coletando resultado de todos os jobs da matrix..."
          echo "Todos os testes da matrix foram executados"